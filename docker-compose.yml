# Local infrastructure for Skyward. Day 0 brings up Postgres + Kafka (KRaft, no Zookeeper).
# The three application services (experience, business+domain core, adapter) are added to this
# file as they become deployable in later slices.

services:
  postgres:
    image: postgres:16-alpine
    container_name: skyward-postgres
    environment:
      POSTGRES_DB: skyward
      POSTGRES_USER: skyward
      POSTGRES_PASSWORD: skyward
    ports:
      # Host port is overridable so a pre-existing local Postgres on 5432 doesn't shadow us.
      - "${SKYWARD_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyward -d skyward"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    # Apache Kafka in KRaft mode (no Zookeeper). Single node acting as both broker and controller.
    image: apache/kafka:3.8.0
    container_name: skyward-kafka
    ports:
      - "${SKYWARD_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  pgdata:

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Temurin 21 — matches the local toolchain and the Java 21 (LTS) target.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # GitHub-hosted Ubuntu runners ship with Docker, so Testcontainers can spin up
      # real Postgres + Kafka here exactly as it does locally.
      - name: Build and test
        run: ./gradlew build --no-daemon
